{% extends "layout.html" %}
{% block title %}Login — Farm Copilot{% endblock %}
{% block content %}

<div style="max-width:400px; margin:2rem auto;">
    <h1 class="mb-2">🔐 Login</h1>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <div class="card">
        <form method="post" action="/login">
            <div class="mb-2">
                <label class="text-sm text-muted" for="email-input" style="display:block; margin-bottom:0.25rem;">Email</label>
                <input type="email" id="email-input" name="email" value="{{ email or '' }}" required autofocus>
            </div>
            <div class="mb-2">
                <label class="text-sm text-muted" for="password-input" style="display:block; margin-bottom:0.25rem;">Password</label>
                <input type="password" id="password-input" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;" id="login-btn">
                Login →
            </button>
        </form>
    </div>

    <p class="text-sm text-muted" style="text-align:center; margin-top:1rem;">
        Don't have an account? <a href="/register">Create one →</a>
    </p>
</div>

{% endblock %}
