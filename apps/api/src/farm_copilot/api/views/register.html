{% extends "layout.html" %}
{% block title %}Register — Farm Copilot{% endblock %}
{% block content %}

<div style="max-width:400px; margin:2rem auto;">
    <h1 class="mb-2">🌱 Create Account</h1>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <div class="card">
        <form method="post" action="/register">
            <div class="mb-2">
                <label class="text-sm text-muted" for="name-input" style="display:block; margin-bottom:0.25rem;">Full Name</label>
                <input type="text" id="name-input" name="name" value="{{ name or '' }}" required autofocus>
            </div>
            <div class="mb-2">
                <label class="text-sm text-muted" for="email-input" style="display:block; margin-bottom:0.25rem;">Email</label>
                <input type="email" id="email-input" name="email" value="{{ email or '' }}" required>
            </div>
            <div class="mb-2">
                <label class="text-sm text-muted" for="password-input" style="display:block; margin-bottom:0.25rem;">Password</label>
                <input type="password" id="password-input" name="password" required minlength="8">
            </div>
            <div class="mb-2">
                <label class="text-sm text-muted" for="farm-name-input" style="display:block; margin-bottom:0.25rem;">Farm Name</label>
                <input type="text" id="farm-name-input" name="farm_name" value="{{ farm_name or '' }}" required placeholder="e.g. Ferma Popescu SRL">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;" id="register-btn">
                Create Account →
            </button>
        </form>
    </div>

    <p class="text-sm text-muted" style="text-align:center; margin-top:1rem;">
        Already have an account? <a href="/login">Login →</a>
    </p>
</div>

{% endblock %}
