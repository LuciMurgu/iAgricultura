# Render blueprint — Farm Copilot (demo deploy)
#
# Deploys both apps as Docker web services:
#   - farm-copilot-api : FastAPI backend  (api.iagricultura.ro)
#   - farm-copilot-web : Next.js frontend (iagricultura.ro)
# The database lives on Supabase (set DATABASE_URL below).
#
# Usage: Render Dashboard > New > Blueprint > pick this repo. Then set the
# secret env vars marked `sync: false` (DATABASE_URL, demo password, and the
# ANAF key only if you later enable ANAF).
services:
  - type: web
    name: farm-copilot-api
    runtime: docker
    # Paths are relative to the repo root.
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    # Free tier (512 MB) is sufficient: sentence-transformers/torch is lazy-imported
    # inside worker functions, not on the API startup path, so it isn't loaded into
    # memory at boot. Free instances spin down after ~15 min idle (cold start ~50s).
    plan: free
    region: frankfurt # Closest Render region to Romania.
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: FRONTEND_URL
        value: https://iagricultura.ro
      - key: SESSION_COOKIE_DOMAIN
        value: .iagricultura.ro
      # Render generates a strong secret and keeps it stable across deploys.
      - key: SESSION_SECRET_KEY
        generateValue: true
      # Supabase transaction-pooler URL (asyncpg). Set in the dashboard.
      - key: DATABASE_URL
        sync: false
      # ANAF disabled for the demo — no real credentials required.
      - key: ANAF_SYNC_ENABLED
        value: "false"
      - key: ANAF_TEST_MODE
        value: "true"
      # Only needed if ANAF is later enabled. Generate with:
      #   python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: ANAF_ENCRYPTION_KEY
        sync: false
      # Demo account seeded on first boot so the login walkthrough works.
      - key: DEMO_SEED_ENABLED
        value: "true"
      - key: DEMO_USER_EMAIL
        value: demo@iagricultura.ro
      - key: DEMO_USER_PASSWORD
        sync: false # Defaults to "demo1234" in code if left unset.
      - key: DEMO_USER_NAME
        value: Cont Demo
      - key: DEMO_FARM_NAME
        value: Ferma Demo

  - type: web
    name: farm-copilot-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: apps/web
    plan: free
    region: frankfurt
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Baked into the client bundle at build time (Render passes env vars as
      # Docker build args to matching ARG instructions). Must be the public API
      # origin so the browser talks to the real backend.
      - key: NEXT_PUBLIC_API_URL
        value: https://api.iagricultura.ro
