# Farm Copilot — nginx reverse proxy for api.iagricultura.ro
#
# This is the canonical production config for the API origin.
# Cloudflare sits in front of this and terminates TLS at the edge.
# The origin listens on plain HTTP port 80; "Full" SSL mode in Cloudflare
# means browser <-> Cloudflare is HTTPS, Cloudflare <-> origin is HTTP.
#
# Install:
#   sudo cp infrastructure/nginx/iagricultura.ro.conf /etc/nginx/sites-available/iagricultura.ro
#   sudo ln -sf /etc/nginx/sites-available/iagricultura.ro /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api.iagricultura.ro;

    # Real visitor IP (Cloudflare provides via CF-Connecting-IP).
    # Trust Cloudflare IPs only.
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # Upload limit for invoice files (XML, PDFs, scans)
    client_max_body_size 10M;

    # Defense-in-depth headers (Cloudflare also adds some)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Health check that Cloudflare can hit cheaply
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Long timeouts for ANAF sync operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}
